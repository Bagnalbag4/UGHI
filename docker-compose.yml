# UGHI v1.0 – Production Docker Compose with Monitoring Stack
# Follows strict_rules.md | Total system ≤ 3.2 GB peak
# Stack: Kernel + Orchestrator + Prometheus + Grafana + Redis (optional)

services:
  # --- UGHI Rust Kernel ---
  kernel:
    build: .
    container_name: ughi-kernel
    command: [ "daemon" ]
    ports:
      - "8420:8420"
    volumes:
      - ughi-data:/home/UGHI/data
      - ughi-models:/home/UGHI/models
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
    environment:
      - RUST_LOG=info
      - UGHI_MAX_AGENTS=64
      - UGHI_MASTER_KEY=${UGHI_MASTER_KEY:-change-me-in-production}
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "./UGHI", "--version" ]
      interval: 30s
      timeout: 5s
      retries: 3

  # --- Go Orchestrator ---
  orchestrator:
    build: .
    container_name: ughi-orchestrator
    entrypoint: [ "./ughi-orchestrator" ]
    command: [ "--api-addr", "0.0.0.0:8080", "--kernel-addr", "kernel:8420", "--max-agents", "64" ]
    ports:
      - "8080:8080"
      - "50052:50052"
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    environment:
      - UGHI_JWT_SECRET=${UGHI_JWT_SECRET:-change-me-in-production}
    depends_on:
      kernel:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-q", "--spider", "http://localhost:8080/health" ]
      interval: 15s
      timeout: 5s
      retries: 3

  # --- Redis (optional, for shared state across instances) ---
  redis:
    image: redis:7-alpine
    container_name: ughi-redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
    volumes:
      - redis-data:/data
    command: [ "redis-server", "--maxmemory", "100mb", "--maxmemory-policy", "allkeys-lru" ]
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 3

  # --- Prometheus (metrics collection) ---
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: ughi-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    depends_on:
      - orchestrator
    restart: unless-stopped

  # --- Grafana (dashboards) ---
  grafana:
    image: grafana/grafana:10.3.0
    container_name: ughi-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-ughi2026}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    depends_on:
      - prometheus
    restart: unless-stopped

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: ughi-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./monitoring/nginx.conf:/etc/nginx/nginx.conf:ro
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.25"
    depends_on:
      - orchestrator
    restart: unless-stopped

volumes:
  ughi-data:
  ughi-models:
  redis-data:
  prometheus-data:
  grafana-data:
