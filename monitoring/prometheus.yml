# UGHI Prometheus Configuration
# Scrapes orchestrator metrics every 15s

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'ughi-orchestrator'
    static_configs:
      - targets: ['orchestrator:8080']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'ughi-kernel'
    static_configs:
      - targets: ['kernel:8420']
    metrics_path: '/metrics'
    scrape_interval: 15s
