# UGHI Nginx Reverse Proxy
# Rate limiting + TLS termination + WebSocket proxy

events {
    worker_connections 1024;
}

http {
    # Rate limiting zone: 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=ughi_api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=ughi_ws:10m rate=5r/s;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Timeouts
    proxy_connect_timeout 10s;
    proxy_read_timeout 60s;
    proxy_send_timeout 10s;

    # Gzip
    gzip on;
    gzip_types application/json text/plain text/html;

    upstream orchestrator {
        server orchestrator:8080;
    }

    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'" always;

        # Health (no rate limit)
        location /health {
            proxy_pass http://orchestrator;
        }

        # API (rate limited)
        location /api/ {
            limit_req zone=ughi_api burst=20 nodelay;
            limit_req_status 429;

            proxy_pass http://orchestrator;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        # WebSocket
        location /ws {
            limit_req zone=ughi_ws burst=5 nodelay;

            proxy_pass http://orchestrator;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Dashboard
        location /dashboard {
            proxy_pass http://orchestrator;
        }

        # Prometheus metrics (internal only in production)
        location /metrics {
            proxy_pass http://orchestrator;
        }

        # Default
        location / {
            proxy_pass http://orchestrator;
        }
    }
}
